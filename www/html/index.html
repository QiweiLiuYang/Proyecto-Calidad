<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto-Calidad</title>
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/bootstrap.bundle.js"></script>
    <script type="text/JavaScript" src="../js/main.js" defer></script>
</head>
<body>
    <header class="navbar border-bottom border-bg-pure-black border-3">
        <nav class="container-fluid row">
            <div class="navbar-brand ms-3 col-sm-12 col-md-auto row align-items-center">
                <div class="col-sm-12 col-md-auto">
                    <img src="../img/Logo_Proyecto_Calidad-sin-bg.png" alt="Logo" width="125px" height="auto">
                </div>
                <div class="ms-3 col-sm-12 col-md-auto">
                    <h1>IES Abastos</h1>
                    <small class="text-muted">Institut d'Educació Secundaria i FP Abastos</small>
                </div>
            </div>
            <div id="divLogin" class="nav col-sm-12 col-md-auto me-5">
                <button id="botonLogin" type="button" class="btn btn-login border-2 px-5 py-2 fs-3" data-bs-toggle="modal" data-bs-target="#modalLogin">Inicio sesión</button>
            </div>
            <div id="divBienvenida" class="nav col-sm12 col-md-auto me-5" style="display: none;">
                <h3>Bienvenido equipo administrativo</h3>
            </div>
            <div class="modal fade" id="modalLogin" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content border border-red">
                        <div class="modal-header border-red">
                            <h4 class="modal-title">Iniciar sesión</h4>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <h5>Introduce tus credenciales para acceder.</h5>
                            <p id="mensajeErrorLogin" style="display: none;">Inicio de sesión fallido, intentalo de nuevo</p>
                            <form id="formularioLogin" class="mt-4"> <!--action="../php/login.php" method="POST"-->
                                <div class="mb-3 row align-items-center">
                                    <label for="usuario" class="pe-3 col-3 col-form-label">Usuario:</label>
                                    <input class="col-6" id="usuario" type="text" name="usuario" value="" required>
                                </div>
                                <div class="mb-3 row align-items-center">
                                    <label for="contrasena" class="pe-3 col-3 col-form-label">Contraseña:</label>
                                    <input class="col-6" id="contrasena" type="password" name="contrasena" value="" required>
                                </div>
                                <div class="mb-3">
                                    <label>
                                        <input type="checkbox" name="recordar" value="si">
                                        Mantener mi sesión abierta durante 10 horas
                                    </label>
                                </div>
                                <div class="modal-footer border-red">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                                    <button type="submit" id="botonSubmit" class="btn btn-red border-red">Entrar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
                </div>
        </nav>
    </header>
    <main>

    </main>
    <footer>

    </footer>
</body>
</html>
