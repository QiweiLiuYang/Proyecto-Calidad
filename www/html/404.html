<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404 - No Encontrado</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
        }
        h1 {
            font-size: 8rem;
            margin: 0;
            color: #ff4757;
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .btn {
            text-decoration: none;
            background-color: #2f3542;
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #57606f;
        }

</head>
<body>

    <div class="container">
        <h1>404</h1>
        <h2>¡Vaya! Página no encontrada</h2>
        <p>Parece que el enlace que seguiste está roto o la página ha sido movida.</p>
        <a href="index.html" class="btn">Volver al Inicio</a>

</html>
